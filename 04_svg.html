<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SVG Dog</title>
<style>
    body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        background: #e6f7ff;
    }
</style>
</head>
<body>

<svg width="500" height="400" viewBox="0 0 500 400">

    <!-- Body -->
    <ellipse cx="250" cy="220" rx="120" ry="70" fill="#c68642"/>

    <!-- Head -->
    <circle cx="140" cy="170" r="60" fill="#c68642"/>

    <!-- Ears -->
    <ellipse cx="95" cy="120" rx="25" ry="50" fill="#8b5a2b"/>
    <ellipse cx="185" cy="120" rx="25" ry="50" fill="#8b5a2b"/>

    <!-- Eyes -->
    <circle cx="120" cy="160" r="6" fill="black"/>
    <circle cx="160" cy="160" r="6" fill="black"/>

    <!-- Nose -->
    <ellipse cx="140" cy="190" rx="12" ry="8" fill="black"/>

    <!-- Mouth -->
    <path d="M130 205 Q140 220 150 205"
          stroke="black"
          stroke-width="2"
          fill="none"/>

    <!-- Tail -->
    <path d="M365 180 Q430 120 400 70"
          stroke="#c68642"
          stroke-width="12"
          fill="none"
          stroke-linecap="round"/>

    <!-- Legs -->
    <rect x="180" y="270" width="20" height="80" fill="#8b5a2b"/>
    <rect x="230" y="270" width="20" height="80" fill="#8b5a2b"/>
    <rect x="290" y="270" width="20" height="80" fill="#8b5a2b"/>
    <rect x="340" y="270" width="20" height="80" fill="#8b5a2b"/>

    <!-- Paws -->
    <ellipse cx="190" cy="355" rx="15" ry="8" fill="#654321"/>
    <ellipse cx="240" cy="355" rx="15" ry="8" fill="#654321"/>
    <ellipse cx="300" cy="355" rx="15" ry="8" fill="#654321"/>
    <ellipse cx="350" cy="355" rx="15" ry="8" fill="#654321"/>

    <!-- Collar -->
    <rect x="95" y="215" width="90" height="10" fill="red"/>

    <!-- Tag -->
    <circle cx="140" cy="230" r="8" fill="gold"/>

</svg>

</body>
</html>
